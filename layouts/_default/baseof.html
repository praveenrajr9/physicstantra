<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    {{ partial "adsense-head.html" . }}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    {{ block "head" . }}{{ end }}
</head>
<body>
    <nav class="site-nav">
        <div class="nav-container">
            <a href="/" class="nav-logo">Physicstantra</a>
            <div class="nav-links">
                {{ range .Site.Menus.main }}
                <a href="{{ .URL }}" class="nav-link">{{ .Name }}</a>
                {{ end }}
            </div>
        </div>
    </nav>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
        <div class="footer-container">
            {{ partial "affiliate-disclosure.html" . }}
            <p>&copy; {{ now.Year }} Physicstantra. All rights reserved.</p>
        </div>
    </footer>
    {{ block "scripts" . }}{{ end }}
</body>
</html>
